# sources.yml -- Data provenance metadata
# Reference: docs/mcp-infrastructure-blueprint.md
# Last verified: 2026-05-17 (MT/CY fleet hygiene Round 2)

schema_version: "1.0"
mcp_name: "Cypriot Cybersecurity MCP"
category: "domain_intelligence"
jurisdiction: "CY"

sources:
  - name: "National CSIRT-CY (Digital Security Authority)"
    authority: "Digital Security Authority of Cyprus / National CSIRT-CY"
    official_url: "https://csirt.cy"
    retrieval_method: "HTML_SCRAPE"
    format: "HTML"
    authentication: "none"
    update_frequency: "weekly"
    license:
      code: "Cyprus-PSI"
      type: "Statutory — Cyprus public-sector information re-use regime"
      url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32019L1024"
      evidence_url: "https://csirt.cy/about-us/open-information"
      summary: >
        CSIRT-CY is part of the Digital Security Authority, a public-sector
        body within scope of Cyprus Law 143(I)/2021 (transposing EU Directive
        2019/1024 on Open Data and re-use of public sector information).
        Article 8 of the directive mandates commercial re-use. On-publisher
        acknowledgement at csirt.cy/about-us/open-information cites Cyprus
        Law 184(I)/2017 (Right of Access to Public Sector Information) and
        the corresponding publication scheme. Re-use rights flow from the
        companion statute Law 143(I)/2021.
      attribution_block: "Source: National CSIRT-CY, Digital Security Authority, Republic of Cyprus. Reproduced under Cyprus public-sector information re-use regime (Law 143(I)/2021, transposing EU Directive 2019/1024)."
    source_url_pattern: "^https?://(www\\.)?csirt\\.cy/(cve|alerts|advisories)/.*"
    source_url_pattern_granularity: "item-level"
    coverage:
      scope: >
        National cybersecurity alerts, advisories, CVE entries, and
        guidance issued by CSIRT-CY and the Digital Security Authority.
    languages:
      - "el"
      - "en"
